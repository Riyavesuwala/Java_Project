<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Register</title>

    <h:outputStylesheet library="css" name="style.css"/>
</h:head>

<h:body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-title">
            Citizen Registration
        </div>

        <h:form>

            <p:growl id="msg" showDetail="true" life="4000"/>

            <span class="field-label">Full Name</span>

            <p:inputText id="fullname" value="#{registerBean.fullname}"
                         required="true"
                         requiredMessage="Full Name is required">

                <f:validateRegex pattern="^[A-Za-z ]{3,50}$"/>

            </p:inputText>

            <p:message for="@previous"/>

            <span class="field-label">Email</span>

            <p:inputText id="email" value="#{registerBean.email}"
                         required="true"
                         requiredMessage="Email is required">

                <f:validateRegex
                    pattern="^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+$"/>

            </p:inputText>

            <p:message for="@previous"/>

            <span class="field-label">Mobile</span>

            <p:inputText id="mobile" value="#{registerBean.mobile}"
                         required="true"
                         requiredMessage="Mobile Number is required">

                <f:validateRegex pattern="^[0-9]{10}$"/>

            </p:inputText>

            <p:message for="@previous"/>

            <span class="field-label">Username</span>

            <p:inputText id="username" value="#{registerBean.username}"
                         required="true"
                         requiredMessage="Username is required">

                <f:validateLength minimum="4"
                                  maximum="20"/>

            </p:inputText>

            <p:message for="@previous"/>

            <span class="field-label">Password</span>

            <p:password id="password" value="#{registerBean.password}"
                        toggleMask="true"
                        feedback="true"
                        required="true"
                        requiredMessage="Password is required">

                <f:validateRegex
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"/>

            </p:password>

            <p:message for="@previous"/>

            <span class="field-label">Confirm Password</span>

            <p:password id="confirmPassword"
                        value="#{registerBean.confirmPassword}"
                        toggleMask="true"
                        feedback="false"
                        required="true"
                        requiredMessage="Confirm Password is required"/>

            <p:message for="confirmPassword"/>

            <p:selectOneMenu id="society" value="#{registerBean.societyId}"
                 required="true"
                 requiredMessage="Please select a society">

            <f:selectItem itemLabel="Select Society"
                          itemValue="#{null}"
                          noSelectionOption="true"/>

            <f:selectItems value="#{registerBean.societies}"
                           var="s"
                           itemLabel="#{s.societyName}"
                           itemValue="#{s.societyId}"/>

            </p:selectOneMenu>

            <p:message for="society"/>

            <br/><br/>

            <p:commandButton
                    value="Register"
                    action="#{registerBean.register()}"
                    update="msg"
                    styleClass="gold-btn"/>

            <div class="auth-links">

                <h:link outcome="/public/login.xhtml"
                        value="Already have an account?"/>

            </div>

        </h:form>

    </div>

</div>

</h:body>
</html>
