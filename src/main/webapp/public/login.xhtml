<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Login</title>

    <h:outputStylesheet library="css" name="style.css"/>
</h:head>

<h:body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-title">
            Citizen Login
        </div>

        <h:form>
            <p:growl id="msg" showDetail="true"/>
            
            <span class="field-label">Username</span>

            <p:inputText id="username"
                         value="#{loginBean.username}"
                         required="true"
                         requiredMessage="Please enter your username."
                         validatorMessage="Username must be at least 4 characters long.">

                <f:validateLength minimum="4"/>

                <p:ajax event="keyup"
                        update="usernameMsg"/>

            </p:inputText>

            <p:message id="usernameMsg"
                       for="username"
                       display="text"/>

            <span class="field-label">Password</span>

            <p:password id="password"
                        value="#{loginBean.password}"
                        required="true"
                        requiredMessage="Please enter your password."
                        validatorMessage="Password must contain uppercase, lowercase, number and minimum 8 characters."
                        toggleMask="true"
                        feedback="false">

                <f:validateRegex
                        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9]).{8,}$"/>

                <p:ajax event="keyup"
                        update="passwordMsg"/>

            </p:password>

            <p:message id="passwordMsg"
                       for="password"
                       display="text"/>

            <br/><br/>            

            <p:commandButton value="Login"
                 action="#{loginBean.login}"
                 update="@form msg"
                 styleClass="gold-btn"/>

            <div class="auth-links">

                <h:link outcome="/public/forgotPassword.xhtml"
                        value="Forgot Password?"/>

                <br/>

                <h:link outcome="/public/register.xhtml"
                        value="Don't have an account?"/>

            </div>
        </h:form>

    </div>

</div>

</h:body>
</html>
