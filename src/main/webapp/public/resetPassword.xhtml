<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Reset Password</title>
    <h:outputStylesheet library="css" name="style.css"/>
</h:head>

<h:body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-title">
            Reset Password
        </div>

        <h:form>

            <p:messages id="msgs"
                        showDetail="true"
                        closable="true"/>

            <span class="field-label">New Password</span>

            <p:password id="password"
                        value="#{resetPasswordBean.password}"
                        toggleMask="true"
                        feedback="true"
                        required="true"
                        requiredMessage="Please enter a password."
                        validatorMessage="Password must contain uppercase, lowercase, number and minimum 8 characters.">

                <f:validateRegex
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9]).{8,}$"/>

                <p:ajax event="keyup"
                        update="passwordMsg"/>

            </p:password>

            <p:message id="passwordMsg"
                       for="password"
                       display="text"/>

            <br/><br/>

            <span class="field-label">Confirm Password</span>

            <p:password id="confirmPassword"
                        value="#{resetPasswordBean.confirmPassword}"
                        toggleMask="true"
                        feedback="false"
                        required="true"
                        requiredMessage="Please confirm your password.">

                <p:ajax event="keyup"
                        update="confirmPasswordMsg"/>

            </p:password>

            <p:message id="confirmPasswordMsg"
                       for="confirmPassword"
                       display="text"/>

            <br/><br/>

            <p:commandButton value="Reset Password"
                             action="#{resetPasswordBean.resetPassword}"
                             update="@form"
                             styleClass="gold-btn"/>

        </h:form>

    </div>

</div>

</h:body>
</html>
