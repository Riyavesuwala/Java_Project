<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<f:metadata>
    <f:viewAction action="#{authBean.checkCitizenAccess}" />
</f:metadata>

<h:head>

    <title>Change Password</title>

    <h:outputStylesheet library="css"
                        name="profile.css"/>

</h:head>

<h:body>

<div class="page-container">

   <div class="page-header">

    <div>
        <h1>My Profile</h1>
        <p>View and update your account details.</p>
    </div>

    <h:link outcome="/citizen/dashboard"
            styleClass="back-btn">

        <i class="pi pi-arrow-left"></i>
        <span>Back to Dashboard</span>

    </h:link>

</div>

    <div class="profile-card">

        <h:form id="passwordForm">

            <div class="field">

                <label>New Password</label>

                <p:password id="password"
                            value="#{changePasswordBean.password}"
                            toggleMask="true"
                            feedback="true"
                            required="true"
                            requiredMessage="Please enter a password."
                            validatorMessage="Password must contain at least one uppercase letter, one lowercase letter, one number and be at least 8 characters long.">

                    <f:validateRegex
                            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9]).{8,}$"/>

                    <p:ajax event="keyup"
                            update="passwordMsg"/>

                </p:password>

                <p:message id="passwordMsg"
                           for="password"
                           display="text"/>

            </div>

            <div class="field">

                <label>Confirm Password</label>

                <p:password id="confirmPassword"
                            value="#{changePasswordBean.confirmPassword}"
                            toggleMask="true"
                            feedback="false"
                            required="true"
                            requiredMessage="Please confirm your password.">

                    <p:ajax event="keyup"
                            update="confirmPasswordMsg"/>

                </p:password>

                <p:message id="confirmPasswordMsg"
                           for="confirmPassword"
                           display="text"/>

            </div>

            <p:messages id="msgs"
                        showDetail="true"
                        closable="true"/>

            <div class="btn-section">

                <p:commandButton value="Change Password"
                                 action="#{changePasswordBean.changePassword}"
                                 update="@form"
                                 styleClass="update-btn"/>

            </div>

        </h:form>

    </div>

</div>

</h:body>

</html>
